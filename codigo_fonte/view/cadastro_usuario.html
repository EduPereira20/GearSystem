<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GearSystem - Cadastro de Usuário</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../styles/dashboard.css">
  <style>
    .form-label { color: #cbd5e1; font-weight: 500; }
    .form-control, .form-select {
      background: #0f172a;
      border: 1px solid #334155;
      color: white;
      padding: 10px;
    }
    .form-control:focus, .form-select:focus {
      background: #0f172a;
      color: white;
      border-color: #38bdf8;
      box-shadow: 0 0 8px rgba(56, 189, 248, 0.3 );
    }
    .btn-save {
      background: #38bdf8;
      color: #0f172a;
      font-weight: bold;
      border: none;
      padding: 12px 30px;
      transition: 0.3s;
    }
    .btn-save:hover { background: #0ea5e9; transform: translateY(-2px); }
    .btn-cancel {
      background: transparent;
      border: 1px solid #475569;
      color: #cbd5e1;
      padding: 12px 30px;
    }
    .btn-cancel:hover { background: #1e293b; color: white; }
    body { background: #0f172a; color: white; }
    .form-control::placeholder { color: #64748b; opacity: 1; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <h3 class="logo mb-4">⚙ GearSystem</h3>
    <a href="home_administrador.html   " class="menu-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="#" class="menu-link"><i class="bi bi-file-earmark-text"></i> Ordem de serviço</a>
    <a href="#" class="menu-link"><i class="bi bi-cash-stack"></i> Faturamento</a>
    <a href="#" class="menu-link"><i class="bi bi-people"></i> Clientes</a>
    <a href="cadastro_mecanicos.html" class="menu-link active" style="background: #1e293b; color: white;"><i class="bi bi-tools"></i> Cadastro de mecânicos</a>
    <a href="#" class="menu-link"><i class="bi bi-hand-index-thumb"></i> Operações manuais</a>

    <button class="btn btn-dark w-100 text-start mt-2" data-bs-toggle="collapse" data-bs-target="#usuariosMenu">
      <i class="bi bi-person"></i> Usuários ▼
    </button>

    <div class="collapse submenu" id="usuariosMenu">
      <a href="cadastro_usuario.html" class="submenu-link">Cadastro Usuário</a>
      <a href="listar_usuarios.html" class="submenu-link">Listar Usuário</a>
    </div>

    <button class="btn btn-dark w-100 text-start mt-2" data-bs-toggle="collapse" data-bs-target="#adminMenu">
      <i class="bi bi-shield-lock"></i> Administradores ▼
    </button>

    <div class="collapse submenu" id="adminMenu">
      <a href="#" class="submenu-link">Cadastro Admin</a>
      <a href="#" class="submenu-link">Listar Admin</a>
    </div>
  </aside>

  <main class="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2><i class="bi bi-person-plus text-info"></i> Cadastro de Usuário</h2>
      <a href="dashboard.html" class="btn btn-outline-light btn-sm">
        <i class="bi bi-arrow-left"></i> Voltar
      </a>
    </div>

    <div class="card-custom">
      <form action="/controller/usuario_php" method="POST">
        <div class="row g-3">
          <div class="col-12">
            <h5 class="text-info border-bottom border-secondary pb-2 mb-3">Informações de Acesso</h5>
          </div>
          
          <div class="col-md-6">
            <label class="form-label">Nome Completo</label>
            <input type="text" name="nome" class="form-control" placeholder="Ex: João Silva" required>
          </div>
          
          <div class="col-md-6">
            <label class="form-label">E-mail</label>
            <input type="email" name="email" class="form-control" placeholder="usuario@email.com" required>
          </div>

          <div class="col-md-5">
            <label class="form-label">CPF</label>
            <input type="text" name="cpf" class="form-control" placeholder="000.000.000-00" maxlength="14" oninput="mascaraCPF(this)" required>
          </div>

          <div class="col-md-7">
            <label class="form-label">Usuário</label>
            <input type="tel" name="nome" class="form-control" placeholder="Ex: joaosilva123" required>
          </div>

          <div class="col-md-7">
            <label class="form-label">Telefone</label>
            <input type="tel" name="telefone" class="form-control" placeholder="(00) 00000-0000" maxlength="15" oninput="mascaraTelefone(this)" required>
          </div>

          <div class="col-md-5">
            <label class="form-label">Cargo / Função</label>
            <input type="text" name="cargo" class="form-control" placeholder="Ex: Atendente">
          </div>
          </div>

          <div class="col-12 mt-5 d-flex justify-content-end gap-3">
            <button type="reset" class="btn btn-cancel">Limpar</button>
            <button type="submit" class="btn btn-save">Cadastrar Usuário</button>
          </div>
        </div>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function mascaraCPF(i ) {
      let v = i.value.replace(/\D/g, "");
      v = v.replace(/(\d{3})(\d)/, "$1.$2");
      v = v.replace(/(\d{3})(\d)/, "$1.$2");
      v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
      i.value = v;
    }
    function mascaraTelefone(i) {
      let v = i.value.replace(/\D/g, "");
      v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
      v = v.replace(/(\d)(\d{4})$/, "$1-$2");
      i.value = v;
    }
  </script>
</body>
</html>
